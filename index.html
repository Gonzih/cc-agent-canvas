<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cc-agent-canvas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #F5F0E8; overflow: hidden; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(180,160,130,0.4); border-radius: 3px; }
      @keyframes mousey {
        0%   { transform: translateY(0px) rotate(0deg) scale(1); }
        25%  { transform: translateY(-18px) rotate(-8deg) scale(1.1); }
        50%  { transform: translateY(0px) rotate(0deg) scale(1); }
        75%  { transform: translateY(-10px) rotate(6deg) scale(1.05); }
        100% { transform: translateY(0px) rotate(0deg) scale(1); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
